services:
  def-cai-serve:
    build:
      context: .
      dockerfile: Dockerfile.serve
    env_file: .env.serve
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"
    network_mode: host
    restart: unless-stopped
    profiles:
      - serve

  def-cai-api:
    build:
      context: .
      dockerfile: Dockerfile.serve
    env_file: .env.serve
    ports:
      - "${ANIMA_SERVE_PORT:-8080}:8080"
    profiles:
      - api

  def-cai-test:
    build:
      context: .
      dockerfile: Dockerfile.serve
    env_file: .env.serve
    command: ["python", "-m", "pytest", "tests/", "-v"]
    profiles:
      - test
